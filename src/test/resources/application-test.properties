# Banco H2 em memória — substitui o PostgreSQL nos testes
spring.datasource.url=jdbc:h2:mem:lupito_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA cria e destrói o schema a cada execução
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway desabilitado — JPA cuida do schema nos testes
spring.flyway.enabled=false

# Segredo JWT de teste (fixo, sem variável de ambiente)
jwt.secret=test-secret-key-for-integration-tests-minimum-32-chars

# SMTP fictício — evita erros de conexão (serviços de e-mail são mockados)
spring.mail.host=localhost
spring.mail.port=3025

# Limites de rate limiting aumentados para não afetar os testes
app.rate-limit.window-seconds=60
app.rate-limit.login.max-requests=100
app.rate-limit.register.max-requests=100
app.rate-limit.email.max-requests=100

# URL do frontend (usada nos e-mails de reset, irrelevante nos testes)
app.frontend.url=http://localhost:4200
app.cleanup.unverified-user-expiry-days=7
