# ─────────────────────────────────────────────────────────────────────────────
# Perfil DEV — banco via Docker Compose (PostgreSQL + pgAdmin)
# Para subir os containers:  docker compose up -d
# pgAdmin disponível em:     http://localhost:5050
#   usuário:  admin@lupito.dev  |  senha: admin
# ─────────────────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:postgresql://localhost:5432/lupitov1
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.placeholder-replacement=false

jwt.secret=lupito-dev-secret-local-apenas-desenvolvimento
groq.api.key=${GROQ_API_KEY:}

# E-mail — definir em application-local.properties (gitignored)
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# Sobrescreve com credenciais locais sensíveis, se existir (nunca sobe ao Git)
spring.config.import=optional:classpath:application-local.properties
