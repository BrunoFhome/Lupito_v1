spring.profiles.active=dev

server.port=${PORT:8081}

jwt.secret=${JWT_SECRET:lupito-dev-secret-change-in-production}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.cleanup.unverified-user-expiry-days=7

app.rate-limit.window-seconds=60
app.rate-limit.login.max-requests=5
app.rate-limit.register.max-requests=5
app.rate-limit.email.max-requests=3

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Timeouts para o envio nao travar a requisicao se o SMTP nao responder
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
