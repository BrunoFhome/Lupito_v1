# ─────────────────────────────────────────────────────────────────────────────
# Configurações comuns a todos os perfis
# Perfil ativo padrão: dev  (sobrescrever via -Dspring.profiles.active=test|prod)
# ─────────────────────────────────────────────────────────────────────────────
spring.profiles.active=dev

server.port=8081

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.cleanup.unverified-user-expiry-days=7

app.rate-limit.window-seconds=60
app.rate-limit.login.max-requests=5
app.rate-limit.register.max-requests=5
app.rate-limit.email.max-requests=3

# E-mail SMTP — credenciais definidas por perfil
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
