spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# Credenciais do banco — definir via variáveis de ambiente em produção
# ou em application-local.properties (gitignored) em desenvolvimento
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.placeholder-replacement=false

server.port=8081

# Chave secreta JWT — obrigatória via variável de ambiente em produção
jwt.secret=${JWT_SECRET}

# Chave da API Groq (IA)
groq.api.key=${GROQ_API_KEY}

# URL do frontend (para links de e-mail)
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# Limpeza de usuários: dias sem verificar e-mail antes de deletar a conta (padrão: 7)
app.cleanup.unverified-user-expiry-days=7

# Rate limiting de endpoints de autenticação (sliding window por IP)
app.rate-limit.window-seconds=60
app.rate-limit.login.max-requests=5
app.rate-limit.register.max-requests=5
app.rate-limit.email.max-requests=3

# Configurações de e-mail (SMTP Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Carrega credenciais locais de desenvolvimento (nunca sobe ao Git)
spring.config.import=optional:classpath:application-local.properties